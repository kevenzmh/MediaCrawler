# MediaCrawler Docker Compose
# 使用说明:
#   1. 复制 .env.example 为 .env 并填写配置
#   2. docker compose up -d          # 仅启动爬虫(默认 JSONL 存储)
#   3. docker compose --profile db up -d  # 启动爬虫 + MySQL
#   4. docker compose --profile full up -d # 启动所有服务

services:
  mediacrawler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mediacrawler
    restart: unless-stopped
    env_file:
      - .env
    # 所有配置通过 .env 文件传入，不在 environment 中重复声明
    # environment 块会覆盖 env_file 的值，长值(如 COOKIES)可能被截断
    volumes:
      - ./data:/app/data
      - ./browser_data:/app/browser_data
      # 挂载自定义配置文件(可选)
      # - ./config/local_config.py:/app/config/local_config.py:ro
      - ./accounts.json:/app/accounts.json
    # 如使用 API WebUI,暴露端口
    # ports:
    #   - "8080:8080"
    # 默认运行爬虫,如需启动 API 请覆盖 command
    # command: ["-m", "uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8080"]
    # depends_on 仅在 db/full profile 中生效 (通过 .env 控制)
    # 如需等待数据库就绪,可在此添加 condition: service_healthy
    profiles:
      - db
      - full
      - ""  # 默认 profile,始终启动

  # ============================================================
  # 可选数据库服务 (按需启用)
  # ============================================================

  mysql:
    image: mysql:8.0
    container_name: mediacrawler-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-mediacrawler}
      MYSQL_USER: ${DB_USER:-mediacrawler}
      MYSQL_PASSWORD: ${DB_PASSWORD:-mediacrawler}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      # 初始化 SQL 脚本(可选)
      # - ./database/schema:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - db
      - full

  redis:
    image: redis:7-alpine
    container_name: mediacrawler-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    profiles:
      - full

  mongo:
    image: mongo:7
    container_name: mediacrawler-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    profiles:
      - full

  # ============================================================
  # API WebUI 服务 (可选)
  # ============================================================

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mediacrawler-api
    restart: unless-stopped
    command: ["-m", "uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8080"]
    env_file:
      - .env
    ports:
      - "9090:8080"
    volumes:
      - ./data:/app/data
      - ./browser_data:/app/browser_data
      - ./accounts.json:/app/accounts.json
    profiles:
      - full
      - api

volumes:
  mysql_data:
  redis_data:
  mongo_data:
